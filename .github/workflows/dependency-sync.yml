name: Dependency sync

# Weekly check for outdated Dart/Flutter packages and security advisories.
# Two paths:
#   1. Auto-PR: opens (or updates) a PR titled "deps: weekly pub outdated check"
#      with a no-op commit if anything is out of date, so Dependabot-style
#      review happens in PR review not on main.
#   2. Advisory check: fails the workflow if any direct dependency has a known
#      security advisory from the OSV database.
#
# This is intentionally lightweight — we don't auto-merge, we don't auto-bump.
# The PR is informational and gives you a weekly cadence to act on.

on:
  schedule:
    # Mondays at 09:00 UTC (after standup for most timezones).
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: write       # needed to create the auto-PR
  pull-requests: write # needed to open PRs

jobs:
  pub-outdated:
    name: pub outdated + security advisories
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable

      - name: Cache pub
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install dependencies
        run: flutter pub get

      - name: Check for outdated packages
        id: outdated
        run: |
          set +e
          # --no-dev-dependencies for runtime; we care about direct deps too.
          OUTDATED=$(flutter pub outdated --no-dev-dependencies 2>&1)
          OUTDATED_DEV=$(flutter pub outdated 2>&1)
          echo "## Runtime outdated packages" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "$OUTDATED" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "## Dev dependencies (subset)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "$OUTDATED_DEV" | head -40 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          # Save the full output for the artifact
          echo "$OUTDATED" > runtime-outdated.txt
          echo "$OUTDATED_DEV" > all-outdated.txt

      - name: Check OSV security advisories
        id: osv
        env:
          WORKSPACE: ${{ github.workspace }}
        run: |
          set +e
          # OSV.dev scans pubspec.lock against the Open Source Vulnerabilities DB.
          # Use the official osv-scanner via Go install — fastest + offline-cacheable.
          go install github.com/google/osv-scanner/v2/cmd/osv-scanner@latest 2>&1 | tail -5
          if command -v osv-scanner &> /dev/null; then
            osv-scanner --lockfile=pubspec.lock --format=markdown \
              > osv-report.md 2>&1 || true
            if grep -q "Total advisories found: 0" osv-report.md 2>/dev/null; then
              echo "No advisories found."
            else
              echo "::warning::Security advisories detected — see osv-report.md"
              cat osv-report.md >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "::notice::osv-scanner not installed; skipping advisory check"
          fi

      - name: Auto-PR if anything changed
        if: steps.outdated.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Only open a PR if the dev-dependency check found something new.
          if grep -q "All dependencies are up to date" all-outdated.txt; then
            echo "All packages up to date — no PR needed."
            exit 0
          fi

          # Check if there's already an open weekly-deps PR.
          EXISTING=$(gh pr list --search "weekly-deps" --state open --json number -q '.[0].number' 2>/dev/null || echo "")
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already open; updating with latest report."
            gh pr comment "$EXISTING" --body-file <(echo "## Weekly outdated check ($(date -u +%FT%TZ))\n\n\`\`\`\n$(cat all-outdated.txt | head -60)\n\`\`\`")
            exit 0
          fi

          # Create a new branch with the report as a commit message.
          BRANCH="deps/weekly-$(date -u +%Y-%m-%d)"
          git checkout -b "$BRANCH"
          git commit --allow-empty -m "deps: weekly pub outdated check" \
            -m "Generated by .github/workflows/dependency-sync.yml" \
            -m "See workflow run for full report."
          git push origin "$BRANCH"
          gh pr create \
            --title "deps: weekly pub outdated check" \
            --body-file <(echo "## Weekly pub outdated report\n\nThis is an automated PR — see the workflow run for full details.\n\n### Runtime\n\n\`\`\`\n$(cat runtime-outdated.txt)\n\`\`\`\n\n### Full report\n\n\`\`\`\n$(cat all-outdated.txt | head -60)\n\`\`\`") \
            --base main \
            --head "$BRANCH" \
            --label "dependencies" \
            --assignee "" \
            --reviewer "" \
            || echo "::warning::PR creation failed, possibly rate-limited. Will retry next week."

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-reports
          path: |
            runtime-outdated.txt
            all-outdated.txt
            osv-report.md
          if-no-files-found: ignore
          retention-days: 30